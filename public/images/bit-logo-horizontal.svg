<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80">
  <defs>
    <linearGradient id="hRingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="50%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
    <clipPath id="hInnerCircle">
      <circle cx="36" cy="40" r="27"/>
    </clipPath>
  </defs>

  <!-- Small circular emblem -->
  <circle cx="36" cy="40" r="35" fill="url(#hRingGrad)"/>
  <circle cx="36" cy="40" r="29" fill="#FFFFFF"/>

  <g clip-path="url(#hInnerCircle)">
    <rect x="0" y="0" width="72" height="80" fill="#F4F8F4"/>
    <!-- Simplified pine trees -->
    <polygon points="36,18 24,52 48,52" fill="#2D8B2D"/>
    <polygon points="36,22 27,48 45,48" fill="#3A9B3A" opacity="0.8"/>
    <polygon points="24,28 16,52 32,52" fill="#1B6B1B" opacity="0.6"/>
    <polygon points="48,28 40,52 56,52" fill="#1B6B1B" opacity="0.6"/>
    <!-- Bird -->
    <g transform="translate(36,22) scale(0.22)">
      <path d="M0,-25 C-8,-22 -15,-12 -18,0 C-20,8 -25,15 -35,18 C-25,16 -20,12 -18,5 C-18,12 -15,20 -8,22 L0,18 L8,22 C15,20 18,12 18,5 C20,12 25,16 35,18 C25,15 20,8 18,0 C15,-12 8,-22 0,-25Z"
            fill="white" stroke="#DDD" stroke-width="1"/>
    </g>
    <!-- Ground -->
    <rect x="9" y="52" width="54" height="20" fill="#2D6B2D" opacity="0.2"/>
    <text x="36" y="62" text-anchor="middle" font-family="serif" font-size="6" font-weight="bold" fill="#5D4E37">1940</text>
  </g>

  <circle cx="36" cy="40" r="35" fill="none" stroke="#6B3410" stroke-width="0.8"/>

  <!-- Chinese text: 北京理工大学 -->
  <text x="85" y="36" font-family="serif, 'Noto Serif SC', SimSun, 'Source Han Serif SC'" font-size="28" font-weight="bold" fill="#1a1a1a" letter-spacing="3">北京理工大学</text>

  <!-- English text -->
  <text x="85" y="58" font-family="'Times New Roman', serif" font-size="11" fill="#666666" letter-spacing="2">BEIJING INSTITUTE OF TECHNOLOGY</text>
</svg>

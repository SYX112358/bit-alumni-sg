<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="50%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
    <linearGradient id="treeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D8B2D"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <clipPath id="innerCircle">
      <circle cx="100" cy="100" r="72"/>
    </clipPath>
  </defs>

  <!-- Outer brown ring -->
  <circle cx="100" cy="100" r="96" fill="url(#ringGrad)"/>
  <circle cx="100" cy="100" r="78" fill="#FFFFFF"/>

  <!-- Inner white area with green bottom -->
  <g clip-path="url(#innerCircle)">
    <rect x="0" y="0" width="200" height="200" fill="#F8F8F0"/>

    <!-- Sky gradient -->
    <rect x="0" y="0" width="200" height="120" fill="#E8F0E8" opacity="0.3"/>

    <!-- Pine tree group - stylized -->
    <!-- Center large tree -->
    <polygon points="100,52 70,130 130,130" fill="#2D7B2D" opacity="0.9"/>
    <polygon points="100,62 76,120 124,120" fill="#3A8B3A" opacity="0.8"/>
    <polygon points="100,45 78,110 122,110" fill="#2D8B2D"/>

    <!-- Left tree -->
    <polygon points="72,68 52,130 92,130" fill="#1B6B1B" opacity="0.7"/>
    <polygon points="72,60 58,118 86,118" fill="#2D7B2D" opacity="0.8"/>

    <!-- Right tree -->
    <polygon points="128,68 108,130 148,130" fill="#1B6B1B" opacity="0.7"/>
    <polygon points="128,60 114,118 142,118" fill="#2D7B2D" opacity="0.8"/>

    <!-- Additional small trees -->
    <polygon points="56,82 42,130 70,130" fill="#1B5E20" opacity="0.5"/>
    <polygon points="144,82 130,130 158,130" fill="#1B5E20" opacity="0.5"/>

    <!-- Dove/Bird symbol -->
    <g transform="translate(100,55) scale(0.6)">
      <path d="M0,-25 C-8,-22 -15,-12 -18,0 C-20,8 -25,15 -35,18 C-25,16 -20,12 -18,5 C-18,12 -15,20 -8,22 L0,18 L8,22 C15,20 18,12 18,5 C20,12 25,16 35,18 C25,15 20,8 18,0 C15,-12 8,-22 0,-25Z"
            fill="white" stroke="#DDD" stroke-width="0.5"/>
    </g>

    <!-- Ground/base -->
    <rect x="28" y="130" width="144" height="45" fill="#2D6B2D" opacity="0.3"/>

    <!-- 1940 year -->
    <text x="100" y="152" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#5D4E37" letter-spacing="2">1940</text>
  </g>

  <!-- Ring border details -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#6B3410" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#8B5E3C" stroke-width="1"/>

  <!-- Chinese text on top arc -->
  <defs>
    <path id="topArc" d="M 30,100 A 70,70 0 0,1 170,100"/>
    <path id="bottomArc" d="M 170,108 A 70,70 0 0,1 30,108"/>
  </defs>

  <text font-family="serif, SimSun, 'Noto Serif SC'" font-size="15" font-weight="bold" fill="#FFFFFF" letter-spacing="6">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">北京理工大学</textPath>
  </text>

  <!-- English text on bottom arc -->
  <text font-family="serif, 'Times New Roman'" font-size="7.5" fill="#FFFFFF" letter-spacing="1.5">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">BEIJING INSTITUTE OF TECHNOLOGY</textPath>
  </text>

  <!-- Decorative dots on ring -->
  <circle cx="100" cy="7" r="2.5" fill="#C4A35A"/>
  <circle cx="100" cy="193" r="2.5" fill="#C4A35A"/>
</svg>
